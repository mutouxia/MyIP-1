<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.7.2/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/suka.css@0.2.1" />
    <title>显示设置 - IP 地址查询</title>
  </head>
  <body>
    <main class="settings-container">
      <header class="settings-header">
        <div>
          <h1 class="title">显示设置</h1>
          <p>选择每个 IP 探测项在首页使用大卡片、小卡片，或完全隐藏。</p>
        </div>
        <a class="settings-back-link" href="../">返回首页</a>
      </header>

      <p class="settings-note">设置只保存在当前浏览器中；隐藏的项目不会发起网络请求。</p>

      <form id="preferences-form">
        <div id="settings-groups"></div>
        <div class="settings-actions">
          <button class="button is-link" type="submit">保存设置</button>
          <button class="button" id="reset-settings" type="button">恢复默认</button>
          <span id="settings-status" class="settings-status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </main>
    <script type="module" src="../pages/settings.ts"></script>
  </body>
</html>
